<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI_bsk_UI - 独立运行模式</title>
  <style>
    /* 基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fff8fa 0%, #fbfbfb 50%, #bfd9f7 100%);
    }
    
    /* 加载提示 */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(163deg, #b0b0b9 0%, #89a1b1 50%, #919191 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.3s ease;
    }
    
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-title {
      color: white;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-top: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 独立模式提示 */
    #standalone-notice {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(102, 126, 234, 0.2);
      color: rgba(255, 255, 255, 0.8);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 9998;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <!-- 加载提示 -->
  <div id="loading-overlay">
    <div class="loading-title">ComfyUI_bsk_UI</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载...</div>
  </div>
  
  <!-- 独立模式提示 -->
  <div id="standalone-notice" style="display: none;">
    独立运行模式 | 按 ESC 关闭面板
  </div>
  
  <!-- 设置独立模式标志 - 必须在加载脚本之前 -->
  <script>
    window.COMFYUI_PANEL_STANDALONE = true;
  </script>
  
  <!-- 主脚本 -->
  <script src="./js/panel.js"></script>
  
  <script>
    // 等待脚本加载完成
    window.addEventListener('load', function() {
      // 隐藏加载提示
      setTimeout(function() {
        var loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) {
          loadingOverlay.classList.add('hidden');
          setTimeout(function() {
            loadingOverlay.style.display = 'none';
          }, 300);
        }
        
        // 显示独立模式提示
        var notice = document.getElementById('standalone-notice');
        if (notice) {
          notice.style.display = 'block';
        }
        
        // 自动显示面板（独立模式下）
        if (window.comfyUIPanel) {
          window.comfyUIPanel.show();
        }
      }, 500);
    });
  </script>
</body>
</html>
